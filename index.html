<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Tracker</title>
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f4; padding: 15px; color: #333; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 12px; }
        .highlight { border: 2px solid #2ecc71; background: #eafaf1; }
        h2 { color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        .btn { color: white; border: none; cursor: pointer; border-radius: 6px; background:#27ae60; padding:10px 15px; font-size:13px; font-weight: bold; }
        #receiver-name { font-weight: bold; color: #27ae60; display: block; margin-top: 5px; }
        .status-paid { color: #27ae60; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Social Tracker</h2>
    
    <div id="payout-info" class="card highlight">
        <strong>Current Recipient:</strong>
        <span id="receiver-name">Locating...</span>
        <p style="margin: 5px 0 0 0; font-size: 14px; color: #666;">Target: KES 500</p>
    </div>

    <div id="member-list">Fetching members...</div>

    <!-- FIXED: Full Supabase library link -->
    <script src="https://jsdelivr.net"></script>

    <script>
        const SUPABASE_URL = 'https://ulhrijosiwhxtseivgoo.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_kbR0lWc7EV9Fek4jPyUuVA_DK5SUJ2b'
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        async function loadMembers() {
            try {
                // Fetch members
                const { data: members, error: mError } = await supabaseClient.from('members').select('*').order('turn_order', { ascending: true });
                if (mError) throw mError;

                // Get current month details
                const monthName = new Date().toLocaleString('default', { month: 'long' });
                const currentMonthNum = new Date().getMonth() + 1;
                
                // Rotation logic
                const turnThisMonth = ((currentMonthNum - 1) % (members.length || 1)) + 1;

                // Fetch payments
                const { data: payments } = await supabaseClient.from('contributions').select('*').eq('month_name', monthName);

                const listDiv = document.getElementById('member-list');
                listDiv.innerHTML = '';

                members.forEach(m => {
                    const isReceiver = m.turn_order === turnThisMonth;
                    const paymentRecord = payments?.find(p => p.member_id === m.id);
                    const hasPaid = paymentRecord ? paymentRecord.is_paid : false;

                    if (isReceiver) {
                        document.getElementById('receiver-name').innerText = `${m.name} (${m.phone_number})`;
                    }

                    const card = document.createElement('div');
                    card.className = isReceiver ? 'card highlight' : 'card';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong style="font-size: 16px;">${m.turn_order}. ${m.name}</strong><br>
                                <small style="color: #888;">${m.phone_number}</small>
                            </div>
                            <div>
                                ${hasPaid 
                                    ? '<span class="status-paid">✅ PAID</span>' 
                                    : `<button class="btn" onclick="markPaid(${m.id}, '${monthName}')">Mark Paid</button>`
                                }
                            </div>
                        </div>
                        ${isReceiver ? '<div style="margin-top:8px; color:#27ae60; font-size:12px; font-weight:bold;">✨ RECIPIENT THIS MONTH</div>' : ''}
                    `;
                    listDiv.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('member-list').innerText = "Connection error. Check your Supabase database.";
            }
        }

        async function markPaid(memberId, month) {
            const userInput = prompt("Enter Group Password:");
            if (userInput) {
                const { data: settings } = await supabaseClient.from('group_settings').select('setting_value').eq('setting_name', 'group_password').single();

                if (settings && userInput === settings.setting_value) {
                    const { error } = await supabaseClient.from('contributions').insert([{ 
                        member_id: memberId, 
                        month_name: month, 
                        is_paid: true, 
                        year: new Date().getFullYear() 
                    }]);
                    if (error) alert("Error saving payment.");
                    else loadMembers();
                } else {
                    alert("Wrong password!");
                }
            }
        }

        loadMembers();
    </script>
</body>
</html>
