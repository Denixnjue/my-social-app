<!-- Load Supabase Library -->
<script src="https://jsdelivr.net"></script>

<script>
    // 1. Setup Connection (Paste your keys here)
    const SUPABASE_URL = 'https://ulhrijosiwhxtseivgoo.supabase.co/rest/v1/'
    const SUPABASE_KEY = 'sb_publishable_kbR0lWc7EV9Fek4jPyUuVA_DK5SUJ2b'
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // 2. Function to fetch and show members
    async function loadMembers() {
        const { data, error } = await supabase
            .from('members')
            .select('*')
            .order('turn_order', { ascending: true })

        if (data) {
            const listDiv = document.getElementById('member-list');
            listDiv.innerHTML = ''; // Clear loading text
            
            data.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<strong>${m.turn_order}. ${m.name}</strong><br>${m.phone_number}`;
                listDiv.appendChild(card);
            });
        }
    }

    loadMembers();
</script>
